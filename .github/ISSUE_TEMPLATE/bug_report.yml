name: Bug report
description: Report a bug with opencode-model-fallback
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug.

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      description: "Run: npm list @renjfk/opencode-model-fallback"
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: opencode-version
    attributes:
      label: OpenCode version
      description: "Shown in the bottom bar of the TUI"
      placeholder: "1.4.6"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux
        - Other
    validations:
      required: true

  - type: dropdown
    id: feature
    attributes:
      label: Affected feature
      options:
        - Fallback routing
        - Cooldown recovery
        - Retryable error matching
        - Timeout handling
        - Plugin loading
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open OpenCode with a configured fallback mapping
        2. Send a request to the original model
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant logs from ~/.local/share/opencode/log/
      render: shell
